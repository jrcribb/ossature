site_name: Ossature Documentation
site_description: An open-source harness for spec-driven code generation
site_url: https://ossature.dev

repo_name: ossature/ossature
repo_url: https://github.com/ossature/ossature

theme:
  name: material
  custom_dir: docs/overrides
  # logo: assets/ossature.png
  palette:
    scheme: default
    primary: black
    accent: black
  font:
    text: Inter
    code: SFMono-Regular
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - offline

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ossature/ossature

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Workflow Guide: getting-started/workflow.md
  - Specification Formats:
      - Overview: specs/overview.md
      - SMD Format: specs/smd.md
      - AMD Format: specs/amd.md
  - Configuration: configuration/ossature-toml.md
  - CLI Reference: cli/commands.md
  - Advanced:
      - Build System: advanced/build-system.md
      - Context Files: advanced/context.md
      - Multi-Spec Projects: advanced/multi-spec.md
      - Prompts: advanced/prompts.md
