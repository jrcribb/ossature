[project]
name = "ntt"
version = "0.1.0"
description = "Specifiction and architecture driven code generation toolkit."
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "Beshr Kayali Reinholdsson", email = "me@beshr.com" }
]
requires-python = ">=3.14"
dependencies = [
    "claude-agent-sdk>=0.1.35",
    "click>=8.3.1",
    "questionary>=2.1.1",
    "rich>=14.3.2",
    "tomli>=2.4.0",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "ruff>=0.15.0",
]

[project.scripts]
ntt = "ntt.cli:app"

[build-system]
requires = ["uv_build>=0.9.26,<0.10.0"]
build-backend = "uv_build"


[tool.ruff]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.14"
strict = true
warn_unreachable = true
